name: Bug report
description: Report incorrect behavior or a regression
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve Codex Limit Guard. Never paste bot tokens or authorization headers.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Quota telemetry
        - Threshold policy
        - Accessibility soft stop
        - Emergency stop
        - Telegram
        - Menu bar / dashboard
        - Packaging / launch at login
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      description: Remove all secrets and private conversation content.
