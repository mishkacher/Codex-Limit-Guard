name: Bootstrap project

on:
  push:
    paths:
      - project.tar.gz.b64

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand audited project tree
        run: |
          base64 --decode project.tar.gz.b64 > /tmp/codex-limit-guard-project.tar.gz
          tar -xzf /tmp/codex-limit-guard-project.tar.gz -C .
          rm -f project.tar.gz.b64 .github/workflows/bootstrap-project.yml
      - name: Publish project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build native Codex Limit Guard for macOS"
          git push
