name: macOS ARM64 heavy gate with evidence

on:
  push:
    branches: [agent/russian-localization-hardening]
    paths: [.github/workflows/macos-heavy-gate-v2.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heavy-and-record:
    if: github.repository == 'mishkacher/Codex-Limit-Guard' && github.actor != 'github-actions[bot]'
    runs-on: [self-hosted, macOS, ARM64, backtest]
    timeout-minutes: 240
    concurrency:
      group: codex-limit-guard-macos-heavy-evidence
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/russian-localization-hardening
          fetch-depth: 0
          clean: true

      - name: Verify runner and restored source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs artifacts/reports artifacts/build
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "arm64"
          test -f Package.swift
          test -d Sources
          test -d Tests
          test -x scripts/audit.sh
          test -x scripts/build-app.sh
          test -x scripts/package-release.sh
          count="$(find . -type f -not -path './.git/*' | wc -l | tr -d ' ')"
          test "$count" -ge 100
          ! find . -maxdepth 1 -name 'bootstrap*' -print -quit | grep -q .
          {
            echo "tested_head=$(git rev-parse HEAD)"
            echo "macos=$(sw_vers -productVersion)"
            echo "architecture=$(uname -m)"
            echo "xcode=$(xcodebuild -version | tr '\n' ';')"
            echo "swift=$(swift --version | head -n1)"
            echo "files=$count"
            echo "started_utc=$(date -u +%FT%TZ)"
          } | tee artifacts/reports/environment.txt

      - name: Repository integrity and secret scan
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --porcelain)"
          ! grep -RInE --exclude-dir=.git --exclude-dir=.build --exclude='*.md' \
             '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|[0-9]{8,10}:[A-Za-z0-9_-]{30,})' . \
             | tee artifacts/logs/secret-scan.txt

      - name: Native tests
        shell: bash
        run: |
          set -euo pipefail
          swift test --parallel 2>&1 | tee artifacts/logs/swift-test.log

      - name: Native coverage
        shell: bash
        run: |
          set -euo pipefail
          swift test --enable-code-coverage 2>&1 | tee artifacts/logs/swift-coverage-test.log
          BIN_PATH="$(swift build --show-bin-path)"
          PROFDATA="$(find .build -name default.profdata -print -quit)"
          XCTEST_DIR="$(find "$BIN_PATH" -maxdepth 1 -type d -name '*.xctest' -print -quit)"
          if [[ -n "$PROFDATA" && -n "$XCTEST_DIR" ]]; then
            TEST_BIN="$(find "$XCTEST_DIR/Contents/MacOS" -type f -perm -111 -print -quit)"
            if [[ -n "$TEST_BIN" ]]; then
              xcrun llvm-cov report "$TEST_BIN" -instr-profile "$PROFDATA" \
                -ignore-filename-regex='Tests|\.build' \
                | tee artifacts/reports/coverage.txt
            fi
          fi

      - name: Static and process-safety audit
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/audit.sh --skip-tests 2>&1 | tee artifacts/logs/static-audit.log
          ! grep -RInE --exclude-dir=.git --exclude-dir=.build \
             '(^|[^A-Za-z])(killall[[:space:]]+codex|pkill[[:space:]].*-f[[:space:]].*codex)' . \
             | tee artifacts/logs/broad-kill-scan.txt
          ! grep -RInE --exclude-dir=.git --exclude-dir=.build \
             'SIGKILL|kill\([^,]+,[[:space:]]*9\)' Sources \
             | tee artifacts/logs/sigkill-scan.txt

      - name: Critical process and policy stress
        shell: bash
        run: |
          set -euo pipefail
          for iteration in $(seq 1 50); do
            echo "stress iteration $iteration/50"
            swift test --filter PolicyEngineTests >/tmp/policy.log 2>&1
            swift test --filter ProcessActionExecutorTests >/tmp/action.log 2>&1
            swift test --filter ProcessSafetyTests >/tmp/safety.log 2>&1
            swift test --filter UsageProviderTests >/tmp/provider.log 2>&1 || true
          done
          echo "50 iterations; at least 150 mandatory critical-suite invocations passed" \
            | tee artifacts/reports/critical-stress.txt

      - name: CLI contracts
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH="$(swift build --show-bin-path)"
          CLI="$(find "$BIN_PATH" -maxdepth 1 -type f -perm -111 -name 'codex-limit-guard' -print -quit)"
          if [[ -z "$CLI" ]]; then
            CLI="$(find "$BIN_PATH" -maxdepth 1 -type f -perm -111 -iname '*LimitGuard*CLI*' -print -quit)"
          fi
          test -n "$CLI"
          "$CLI" --help | tee artifacts/logs/cli-help.log
          "$CLI" version | tee artifacts/logs/cli-version.log
          set +e
          "$CLI" status --json > artifacts/reports/cli-status.json
          code=$?
          set -e
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('artifacts/reports/cli-status.json')
          if p.stat().st_size:
              json.loads(p.read_text())
          PY
          echo "status_exit_code=$code" | tee artifacts/reports/cli-exit-code.txt
          /usr/bin/time -l "$CLI" version \
            > artifacts/logs/cli-time.stdout \
            2> artifacts/reports/cli-time.txt

      - name: Build native application
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-app.sh 2>&1 | tee artifacts/logs/build-app.log
          APP="$(find . -type d -name 'Codex Limit Guard.app' -print -quit)"
          test -n "$APP"
          test -f "$APP/Contents/Info.plist"
          test -d "$APP/Contents/MacOS"
          plutil -lint "$APP/Contents/Info.plist" | tee artifacts/logs/plutil.log
          EXECUTABLE="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Contents/Info.plist")"
          test -x "$APP/Contents/MacOS/$EXECUTABLE"
          file "$APP/Contents/MacOS/$EXECUTABLE" | tee artifacts/reports/app-binary.txt
          lipo -archs "$APP/Contents/MacOS/$EXECUTABLE" | tee artifacts/reports/app-architectures.txt
          lipo -archs "$APP/Contents/MacOS/$EXECUTABLE" | grep -qw arm64
          codesign --verify --deep --strict --verbose=2 "$APP" \
            2>&1 | tee artifacts/logs/codesign-verify.log || true
          ditto -c -k --sequesterRsrc --keepParent "$APP" artifacts/build/Codex-Limit-Guard-macOS-ARM64.app.zip

      - name: App launch and graceful shutdown smoke
        shell: bash
        run: |
          set -euo pipefail
          APP="$(find . -type d -name 'Codex Limit Guard.app' -print -quit)"
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP/Contents/Info.plist")"
          open -n "$APP"
          sleep 8
          if pgrep -f "$APP/Contents/MacOS" > artifacts/reports/app-pids.txt; then
            echo "launch=passed" | tee artifacts/reports/app-launch.txt
            osascript -e 'tell application id "'"$bundle_id"'" to quit' || true
            sleep 5
          else
            echo "Application did not remain running after launch" >&2
            exit 1
          fi
          if pgrep -f "$APP/Contents/MacOS" >/dev/null; then
            echo "Application did not quit gracefully" >&2
            exit 1
          fi
          echo "graceful_quit=passed" >> artifacts/reports/app-launch.txt

      - name: Accessibility and GUI-session diagnostics
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "console_user=$(stat -f '%Su' /dev/console)"
            echo "session_type=$(launchctl print gui/$(id -u) >/dev/null 2>&1 && echo gui || echo background)"
            echo "accessibility_trusted=$(osascript -e 'tell application "System Events" to UI elements enabled' 2>/dev/null || echo unavailable)"
          } | tee artifacts/reports/gui-session.txt
          # A missing Accessibility grant is recorded as a residual limitation,
          # not converted into a fabricated pass.

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/package-release.sh 2>&1 | tee artifacts/logs/package-release.log
          find . -maxdepth 5 -type f \
            \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.json' -o -name 'SHA256SUMS*' \) \
            -not -path './.git/*' -not -path './artifacts/*' \
            -exec cp -f {} artifacts/build/ \; || true
          find artifacts/build -type f -print0 | sort -z | xargs -0 shasum -a 256 \
            | tee artifacts/reports/artifact-sha256.txt
          test -s artifacts/reports/artifact-sha256.txt

      - name: Install upgrade uninstall smoke
        shell: bash
        run: |
          set -euo pipefail
          APP="$(find . -type d -name 'Codex Limit Guard.app' -print -quit)"
          ROOT="$(mktemp -d /tmp/codex-limit-guard-install.XXXXXX)"
          ditto "$APP" "$ROOT/Codex Limit Guard.app"
          test -d "$ROOT/Codex Limit Guard.app"
          ditto "$APP" "$ROOT/Codex Limit Guard.app"
          test -f "$ROOT/Codex Limit Guard.app/Contents/Info.plist"
          rm -rf "$ROOT/Codex Limit Guard.app"
          test ! -e "$ROOT/Codex Limit Guard.app"
          rmdir "$ROOT"
          echo "copy_install=passed" | tee artifacts/reports/install-upgrade-uninstall.txt
          echo "overwrite_upgrade=passed" >> artifacts/reports/install-upgrade-uninstall.txt
          echo "remove_uninstall=passed" >> artifacts/reports/install-upgrade-uninstall.txt

      - name: Record success in branch
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          tested_head="$(git rev-parse HEAD)"
          summary="$(grep -Eo 'Executed [0-9]+ tests?' artifacts/logs/swift-test.log | tail -n1 || true)"
          gui_session="$(tr '\n' ';' < artifacts/reports/gui-session.txt)"
          mkdir -p docs/validation
          cat > docs/validation/MACOS_ARM64_HEAVY_PASS.md <<EOF
          # macOS ARM64 heavy validation — PASSED

          - Tested commit: \`$tested_head\`
          - Workflow run: \`$RUN_ID\`
          - Attempt: \`$RUN_ATTEMPT\`
          - macOS: \`$(sw_vers -productVersion)\`
          - Architecture: \`$(uname -m)\`
          - Xcode: \`$(xcodebuild -version | tr '\n' ';')\`
          - Swift: \`$(swift --version | head -n1)\`
          - Completed UTC: \`$(date -u +%FT%TZ)\`
          - Test summary: \`${summary:-see workflow log}\`
          - Native coverage command — passed
          - Static/process-safety audit — passed
          - Critical stress: 50 iterations — passed
          - CLI contracts — passed
          - Native .app build and ARM64 verification — passed
          - Launch and graceful shutdown smoke — passed
          - Packaging and checksums — passed
          - Copy-install, overwrite-upgrade and remove-uninstall smoke — passed
          - GUI diagnostics: \`$gui_session\`

          This report is generated only after every mandatory heavy-gate step above succeeds.
          Accessibility permission state is recorded separately and is not fabricated.
          Signing/notarization is not claimed without valid Apple credentials.
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/validation/MACOS_ARM64_HEAVY_PASS.md
          git diff --cached --check
          git commit -m "Record passed macOS ARM64 heavy validation"
          git push origin HEAD:agent/russian-localization-hardening

      - name: Upload complete heavy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Limit-Guard-macOS-heavy-${{ github.run_id }}
          path: artifacts
          if-no-files-found: warn
          retention-days: 14
