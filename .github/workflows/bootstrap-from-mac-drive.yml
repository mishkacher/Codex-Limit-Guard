name: Bootstrap release candidate from Mac Drive

on:
  push:
    branches:
      - agent/russian-localization-hardening
    paths:
      - .github/workflows/bootstrap-from-mac-drive.yml

permissions:
  contents: write

concurrency:
  group: codex-limit-guard-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: [self-hosted, macOS, ARM64, backtest]
    timeout-minutes: 240
    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Locate and verify source archive
        shell: bash
        env:
          ARCHIVE_NAME: Codex-Limit-Guard-0.2.0-local-source.tar.gz
          EXPECTED_SHA256: 51edda6148e499c33454551c2888ef0d61712df012d2a4665d38e1a8bd02e27e
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          roots=(
            "$HOME/Library/CloudStorage"
            "$HOME/Google Drive"
            "$HOME/Downloads"
            "$HOME/Desktop"
          )
          archive=""
          for root in "${roots[@]}"; do
            if [[ -d "$root" ]]; then
              candidate="$(find "$root" -type f -name "$ARCHIVE_NAME" -print -quit 2>/dev/null || true)"
              if [[ -n "$candidate" ]]; then
                archive="$candidate"
                break
              fi
            fi
          done
          if [[ -z "$archive" ]]; then
            {
              echo "Archive was not found in the allowed user locations."
              echo "Checked CloudStorage, Google Drive, Downloads, and Desktop."
            } | tee diagnostics/archive-location.txt
            exit 20
          fi
          actual_sha="$(shasum -a 256 "$archive" | awk '{print $1}')"
          printf 'archive=%s\nsha256=%s\n' "$(basename "$archive")" "$actual_sha" | tee diagnostics/archive-verification.txt
          test "$actual_sha" = "$EXPECTED_SHA256"
          cp "$archive" /tmp/Codex-Limit-Guard-source.tar.gz

      - name: Restore clean source tree
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/Codex-Limit-Guard-source.tar.gz --strip-components=1 -C .
          test -f Package.swift
          test -x scripts/audit.sh
          test -x scripts/release-bundle.sh

      - name: Toolchain diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          {
            sw_vers
            uname -a
            uname -m
            swift --version
            xcodebuild -version
          } | tee diagnostics/environment.txt
          test "$(uname -m)" = "arm64"

      - name: Run Swift tests with coverage
        shell: bash
        run: |
          set -o pipefail
          swift test --parallel --enable-code-coverage 2>&1 | tee diagnostics/swift-test.log

      - name: Run security and architecture audit
        shell: bash
        run: |
          set -o pipefail
          ./scripts/audit.sh --skip-tests 2>&1 | tee diagnostics/audit.log

      - name: Build complete release candidate bundle
        shell: bash
        env:
          VERSION: 0.2.0-rc
        run: |
          set -o pipefail
          ./scripts/release-bundle.sh --full 2>&1 | tee diagnostics/release-bundle.log

      - name: CLI smoke tests
        shell: bash
        run: |
          set -euo pipefail
          swift run codex-limit-guard --help > diagnostics/cli-help.txt
          swift run codex-limit-guard version > diagnostics/cli-version.txt
          swift run codex-limit-guard status --json > diagnostics/cli-status.json || status=$?
          status="${status:-0}"
          printf 'status_exit_code=%s\n' "$status" | tee diagnostics/cli-exit-codes.txt
          test "$status" -eq 4 -o "$status" -eq 5 -o "$status" -eq 0

      - name: Verify app launch smoke
        shell: bash
        run: |
          set -euo pipefail
          app="dist/Codex Limit Guard.app"
          test -d "$app"
          executable="$app/Contents/MacOS/CodexLimitGuard"
          test -x "$executable"
          "$executable" > diagnostics/app-launch.log 2>&1 &
          app_pid=$!
          sleep 5
          kill -0 "$app_pid"
          kill -TERM "$app_pid"
          wait "$app_pid" || true

      - name: Record artifact hashes
        if: always()
        shell: bash
        run: |
          mkdir -p diagnostics
          find dist local-release-bundle -type f -print0 2>/dev/null | sort -z | xargs -0 shasum -a 256 > diagnostics/artifact-sha256.txt || true
          git status --short > diagnostics/git-status.txt

      - name: Publish validated clean working tree
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Russian localization and release hardening"
          git push origin HEAD:agent/russian-localization-hardening
          git rev-parse HEAD | tee diagnostics/clean-sha.txt

      - name: Upload macOS validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Limit-Guard-macOS-heavy-evidence
          path: |
            diagnostics/
            dist/
            local-release-bundle/
          if-no-files-found: warn
          retention-days: 14
