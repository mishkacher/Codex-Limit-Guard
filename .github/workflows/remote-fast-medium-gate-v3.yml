name: Remote fast medium gate v3

on:
  push:
    branches: [agent/russian-localization-hardening]
    paths: [.github/workflows/remote-fast-medium-gate-v3.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    if: github.repository == 'mishkacher/Codex-Limit-Guard' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/russian-localization-hardening
          fetch-depth: 0
          clean: true

      - name: Source preflight
        shell: bash
        run: |
          set -euo pipefail
          test -f Package.swift
          test -d Sources
          test -d Tests
          test -f README.md
          test -x scripts/audit.sh
          ! find . -maxdepth 1 -name 'bootstrap*' -print -quit | grep -q .
          git diff --check
          git status --short

      - name: Tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/clg-v3
          swift test --parallel 2>&1 | tee /tmp/clg-v3/tests.log

      - name: Coverage build
        shell: bash
        run: |
          set -euo pipefail
          swift test --enable-code-coverage 2>&1 | tee /tmp/clg-v3/coverage.log

      - name: Audit
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/audit.sh --skip-tests 2>&1 | tee /tmp/clg-v3/audit.log
          if grep -RInE --exclude-dir=.git --exclude-dir=.build \
            '(^|[^A-Za-z])(killall[[:space:]]+codex|pkill[[:space:]].*-f[[:space:]].*codex)' .; then
            echo 'Broad process kill detected' >&2
            exit 1
          fi

      - name: CLI smoke
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH="$(swift build --show-bin-path)"
          CLI="$(find "$BIN_PATH" -maxdepth 1 -type f -perm -111 -name 'codex-limit-guard' -print -quit)"
          if [[ -z "$CLI" ]]; then
            CLI="$(find "$BIN_PATH" -maxdepth 1 -type f -perm -111 -iname '*LimitGuard*CLI*' -print -quit)"
          fi
          test -n "$CLI"
          "$CLI" --help >/tmp/clg-v3/cli-help.txt
          "$CLI" version >/tmp/clg-v3/cli-version.txt

      - name: Record pass
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          tested="$(git rev-parse HEAD)"
          summary="$(grep -Eo 'Executed [0-9]+ tests?' /tmp/clg-v3/tests.log | tail -n1 || true)"
          mkdir -p docs/validation
          cat > docs/validation/REMOTE_FAST_MEDIUM_V3_PASS.md <<EOF
          # Remote fast/medium gate v3 — PASSED

          - Tested commit: \`$tested\`
          - Run ID: \`$RUN_ID\`
          - Swift: \`$(swift --version | head -n1)\`
          - Completed UTC: \`$(date -u +%FT%TZ)\`
          - Tests: \`${summary:-passed; see Actions log}\`
          - Coverage build: passed
          - Static audit: passed
          - Broad kill scan: passed
          - CLI help/version smoke: passed
          EOF
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/validation/REMOTE_FAST_MEDIUM_V3_PASS.md
          git diff --cached --check
          git commit -m 'Record passed remote fast medium gate v3'
          git push origin HEAD:agent/russian-localization-hardening
