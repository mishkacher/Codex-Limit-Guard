name: Validate project

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-validation:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Swift toolchain
        run: swift --version
      - name: Test core and macOS target
        run: swift test --parallel
      - name: Run security and architecture audit
        run: ./scripts/audit.sh
      - name: Build native app bundle
        run: ./scripts/build-app.sh
      - name: Verify app bundle
        run: ./scripts/verify-app.sh
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Limit-Guard-macOS
          path: dist/Codex-Limit-Guard-macOS.zip
          if-no-files-found: error
