name: Validate project

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-validation:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - name: Apply audited Swift 5.10 compatibility patch
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          accessibility = Path("Sources/CodexLimitGuardMac/AccessibilityController.swift")
          text = accessibility.read_text()
          text = text.replace(
              "private func stringAttribute(_ name: CFString, element: AXUIElement) -> String? {\n        var value: CFTypeRef?\n        guard AXUIElementCopyAttributeValue(element, name, &value) == .success else { return nil }",
              "private func stringAttribute(_ name: String, element: AXUIElement) -> String? {\n        var value: CFTypeRef?\n        guard AXUIElementCopyAttributeValue(element, name as CFString, &value) == .success else { return nil }"
          )
          text = text.replace(
              "private func boolAttribute(_ name: CFString, element: AXUIElement) -> Bool? {\n        var value: CFTypeRef?\n        guard AXUIElementCopyAttributeValue(element, name, &value) == .success else { return nil }",
              "private func boolAttribute(_ name: String, element: AXUIElement) -> Bool? {\n        var value: CFTypeRef?\n        guard AXUIElementCopyAttributeValue(element, name as CFString, &value) == .success else { return nil }"
          )
          text = text.replace(
              "trimmingCharacters(in: .whitespacesAndNewlines)",
              "trimmingCharacters(in: CharacterSet.whitespacesAndNewlines)"
          )
          accessibility.write_text(text)

          app_model = Path("Sources/CodexLimitGuardMac/AppModel.swift")
          text = app_model.read_text()
          old = """    private func startActivityTimer() {\n        activityTimer?.invalidate()\n        activityTimer = Timer.scheduledTimer(withTimeInterval: 2, repeats: true) { [weak self] _ in\n            Task { @MainActor in self?.sampleActivityAndEvaluate() }\n        }\n        RunLoop.main.add(activityTimer!, forMode: .common)\n    }\n"""
          new = """    private func startActivityTimer() {\n        activityTimer?.invalidate()\n        let timer = Timer(\n            timeInterval: 2,\n            target: self,\n            selector: #selector(activityTimerDidFire(_:)),\n            userInfo: nil,\n            repeats: true\n        )\n        activityTimer = timer\n        RunLoop.main.add(timer, forMode: .common)\n    }\n\n    @objc private func activityTimerDidFire(_ timer: Timer) {\n        sampleActivityAndEvaluate()\n    }\n"""
          if old in text:
              text = text.replace(old, new)
          app_model.write_text(text)
          PY

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Sources/CodexLimitGuardMac/AccessibilityController.swift Sources/CodexLimitGuardMac/AppModel.swift
            git commit -m "Fix Swift 5.10 macOS compatibility"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Swift toolchain
        run: swift --version

      - name: Test core and macOS target
        shell: bash
        run: |
          set -o pipefail
          mkdir -p diagnostics
          swift test --parallel 2>&1 | tee diagnostics/swift-test.log

      - name: Upload Swift diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-diagnostics
          path: diagnostics/swift-test.log
          if-no-files-found: error

      - name: Run security and architecture audit
        shell: bash
        run: |
          set -o pipefail
          ./scripts/audit.sh 2>&1 | tee diagnostics/audit.log

      - name: Upload audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-diagnostics
          path: diagnostics/audit.log
          if-no-files-found: ignore

      - name: Build and verify native macOS app
        shell: bash
        run: |
          set -o pipefail
          {
            ./scripts/build-app.sh
            ./scripts/verify-app.sh
          } 2>&1 | tee diagnostics/macos-build.log

      - name: Upload macOS artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Limit-Guard-macOS
          path: dist/Codex-Limit-Guard-macOS.zip
          if-no-files-found: error

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-diagnostics
          path: diagnostics/macos-build.log
          if-no-files-found: ignore
