name: Publish audited project

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - bootstrap/READY
      - bootstrap/chunk-*
      - bootstrap/publish.sh

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reassemble and verify audited project tree
        run: bash bootstrap/publish.sh

      - name: Test core
        run: swift test --parallel

      - name: Run security and architecture audit
        run: ./scripts/audit.sh

      - name: Build and verify native macOS app
        run: |
          ./scripts/build-app.sh
          ./scripts/verify-app.sh

      - name: Publish clean project tree to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build native Codex Limit Guard for macOS"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
