name: Bootstrap project chunks

on:
  push:
    paths:
      - bootstrap/READY

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reassemble audited project tree
        run: |
          cat bootstrap/chunk-* > /tmp/project.tar.gz.b64
          base64 --decode /tmp/project.tar.gz.b64 > /tmp/codex-limit-guard-project.tar.gz
          tar -xzf /tmp/codex-limit-guard-project.tar.gz -C .
          rm -rf bootstrap project.tar.gz.b64
          rm -f .github/workflows/bootstrap-project.yml .github/workflows/bootstrap-chunks.yml
      - name: Publish project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build native Codex Limit Guard for macOS"
          git push
