name: Publish audited project

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - bootstrap/READY
      - bootstrap/chunk-*
      - bootstrap/publish.sh

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Reassemble and verify audited project tree
        run: bash bootstrap/publish.sh

      - name: Publish clean project tree to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git restore --source=HEAD --staged --worktree .github/workflows
          git commit -m "Build native Codex Limit Guard for macOS"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Test core and macOS target
        shell: bash
        run: |
          set -o pipefail
          mkdir -p diagnostics
          swift test --parallel 2>&1 | tee diagnostics/swift-test.log
          rm -f diagnostics/swift-test.log
          rmdir diagnostics 2>/dev/null || true

      - name: Persist Swift diagnostics on failure
        if: failure() && hashFiles('diagnostics/swift-test.log') != ''
        shell: bash
        run: |
          git add -f diagnostics/swift-test.log
          git commit -m "Record Swift compilation diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Run security and architecture audit
        shell: bash
        run: |
          set -o pipefail
          mkdir -p diagnostics
          ./scripts/audit.sh 2>&1 | tee diagnostics/audit.log
          rm -f diagnostics/audit.log
          rmdir diagnostics 2>/dev/null || true

      - name: Persist audit diagnostics on failure
        if: failure() && hashFiles('diagnostics/audit.log') != ''
        shell: bash
        run: |
          git add -f diagnostics/audit.log
          git commit -m "Record architecture audit diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Build and verify native macOS app
        shell: bash
        run: |
          set -o pipefail
          mkdir -p diagnostics
          {
            ./scripts/build-app.sh
            ./scripts/verify-app.sh
          } 2>&1 | tee diagnostics/macos-build.log
          rm -f diagnostics/macos-build.log
          rmdir diagnostics 2>/dev/null || true

      - name: Persist build diagnostics on failure
        if: failure() && hashFiles('diagnostics/macos-build.log') != ''
        shell: bash
        run: |
          git add -f diagnostics/macos-build.log
          git commit -m "Record macOS bundle diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
