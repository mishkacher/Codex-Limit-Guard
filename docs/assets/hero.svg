<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Limit Guard hero</title>
  <desc id="desc">Dark premium product banner showing a quota shield, status ring, and hybrid stop thresholds.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="30" x2="1140" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B17"/><stop offset="0.48" stop-color="#171332"/><stop offset="1" stop-color="#082637"/>
    </linearGradient>
    <linearGradient id="accent" x1="210" y1="70" x2="485" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/><stop offset="0.55" stop-color="#28B8FF"/><stop offset="1" stop-color="#58E6C2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/><stop offset="0.5" stop-color="#2BC1FF"/><stop offset="1" stop-color="#61F0C6"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="54"/></filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/></filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#38BDF8" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="1060" cy="80" r="190" fill="#6D28D9" fill-opacity="0.22" filter="url(#blur)"/>
  <circle cx="220" cy="450" r="190" fill="#0891B2" fill-opacity="0.18" filter="url(#blur)"/>
  <path d="M0 410C205 337 335 485 554 412C769 340 882 184 1200 241V520H0V410Z" fill="#FFFFFF" fill-opacity="0.025"/>

  <g>
    <rect x="52" y="48" width="466" height="424" rx="28" fill="#FFFFFF" fill-opacity="0.065" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="74" y="70" width="422" height="38" rx="12" fill="#FFFFFF" fill-opacity="0.045"/>
    <circle cx="96" cy="89" r="6" fill="#FB7185"/><circle cx="116" cy="89" r="6" fill="#FBBF24"/><circle cx="136" cy="89" r="6" fill="#4ADE80"/>
    <text x="286" y="95" text-anchor="middle" fill="#A8B0C7" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="600">CODEX LIMIT GUARD</text>

    <circle cx="285" cy="273" r="124" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="22"/>
    <path d="M285 149A124 124 0 1 1 180.3 339.5" stroke="url(#ring)" stroke-width="22" stroke-linecap="round" filter="url(#soft)"/>
    <path d="M285 193C328 193 366 210 389 231L377 332C371 376 333 405 285 420C237 405 199 376 193 332L181 231C204 210 242 193 285 193Z" fill="#FFFFFF" fill-opacity="0.96"/>
    <path d="M224 303A66 66 0 0 1 346 303" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
    <path d="M285 303L329 262" stroke="#30215F" stroke-width="13" stroke-linecap="round"/>
    <circle cx="285" cy="303" r="14" fill="#30215F"/>
    <text x="285" y="252" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="750">84%</text>
    <text x="285" y="442" text-anchor="middle" fill="#A8B0C7" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">quota healthy · all windows monitored</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="570" y="106" fill="#F6F7FC" font-size="48" font-weight="760" letter-spacing="-1.5">Protect the last</text>
    <text x="570" y="159" fill="url(#accent)" font-size="48" font-weight="760" letter-spacing="-1.5">15% of Codex quota.</text>
    <text x="572" y="205" fill="#B5BDD2" font-size="18">Native macOS monitoring. Hybrid external-task stopping.</text>
    <text x="572" y="232" fill="#B5BDD2" font-size="18">Local-first, open source, and deliberately scoped.</text>

    <g transform="translate(570 272)">
      <rect width="560" height="142" rx="22" fill="#FFFFFF" fill-opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.105"/>
      <g transform="translate(24 25)">
        <circle cx="22" cy="22" r="22" fill="#FACC15" fill-opacity="0.16"/><text x="22" y="27" text-anchor="middle" fill="#FDE047" font-size="14" font-weight="700">20</text>
        <text x="58" y="18" fill="#F7F8FC" font-size="15" font-weight="700">Warn</text><text x="58" y="39" fill="#929CB5" font-size="13">macOS + Telegram</text>
      </g>
      <g transform="translate(205 25)">
        <circle cx="22" cy="22" r="22" fill="#FB923C" fill-opacity="0.16"/><text x="22" y="27" text-anchor="middle" fill="#FDBA74" font-size="14" font-weight="700">15</text>
        <text x="58" y="18" fill="#F7F8FC" font-size="15" font-weight="700">Block</text><text x="58" y="39" fill="#929CB5" font-size="13">new task guard</text>
      </g>
      <g transform="translate(386 25)">
        <circle cx="22" cy="22" r="22" fill="#EC4899" fill-opacity="0.16"/><text x="22" y="27" text-anchor="middle" fill="#F9A8D4" font-size="14" font-weight="700">12</text>
        <text x="58" y="18" fill="#F7F8FC" font-size="15" font-weight="700">Soft stop</text><text x="58" y="39" fill="#929CB5" font-size="13">Accessibility</text>
      </g>
      <path d="M47 91H513" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8" stroke-linecap="round"/>
      <path d="M47 91H430" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
      <circle cx="47" cy="91" r="7" fill="#FDE047"/><circle cx="228" cy="91" r="7" fill="#FDBA74"/><circle cx="409" cy="91" r="7" fill="#F9A8D4"/><circle cx="513" cy="91" r="7" fill="#FB7185"/>
      <text x="513" y="122" text-anchor="middle" fill="#FB7185" font-size="12" font-weight="700">10% EMERGENCY</text>
    </g>

    <g transform="translate(570 438)">
      <rect width="142" height="34" rx="17" fill="#34D399" fill-opacity="0.13" stroke="#34D399" stroke-opacity="0.2"/>
      <circle cx="18" cy="17" r="5" fill="#4ADE80"/><text x="31" y="22" fill="#BAF7D8" font-size="13" font-weight="650">LOCAL FIRST</text>
      <rect x="155" width="132" height="34" rx="17" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-opacity="0.2"/>
      <text x="221" y="22" text-anchor="middle" fill="#BCEAFF" font-size="13" font-weight="650">SWIFTUI</text>
      <rect x="300" width="156" height="34" rx="17" fill="#A78BFA" fill-opacity="0.12" stroke="#A78BFA" stroke-opacity="0.2"/>
      <text x="378" y="22" text-anchor="middle" fill="#DDD1FF" font-size="13" font-weight="650">OPEN SOURCE</text>
    </g>
  </g>
</svg>
